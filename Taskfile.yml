version: '3'

# Taskfile is the single entry point for the Hovel build system.
#
# Do NOT invoke bazel, gofmt, uv, or lefthook directly. Every supported
# operation is a task below; humans, CI, git hooks, and AI agents all go
# through `task <name>`. This keeps one correct, discoverable way to build,
# test, lint, run, and format the project.
#
# Conventions:
#   task <name>                 run a task
#   task <name> -- <args>       forward extra args to the underlying tool
#                               (supported by build, test, run, throw)
#   task --list                 list tasks
#
# Quick start for developers:
#   task start                  build and launch the interactive CLI
#   task status                 is the dev daemon running?
#   task reset                  wipe local state and relaunch fresh
# The dev workspace defaults to ./.hovel; override with HOVEL_WORKSPACE.

vars:
  # Absolute so the daemon resolves the config (and its relative project_dir /
  # command paths) against the source tree rather than the bazel runfiles tree,
  # where the staged example binaries (examples/bin/) do not exist.
  MODULE_CONFIG:
    sh: echo "$PWD/examples/hovel-modules.json"
  WORKSPACE:
    sh: echo "${HOVEL_WORKSPACE:-$PWD/.hovel}"

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list
    silent: true

  # --- Developer quick start ----------------------------------------------

  start:
    aliases: [dev, up, cli]
    desc: Build and launch the interactive Hovel CLI (auto-starts a daemon).
    interactive: true
    deps: [modules:build]
    env:
      HOVEL_MODULE_CONFIG: '{{.MODULE_CONFIG}}'
    cmds:
      - bazel run //cmd/hovel -- cli --workspace "{{.WORKSPACE}}"

  daemon:
    desc: Run hoveld in the foreground on the default Unix socket.
    interactive: true
    deps: [modules:build]
    env:
      HOVEL_MODULE_CONFIG: '{{.MODULE_CONFIG}}'
    cmds:
      - bazel run //cmd/hovel -- daemon serve --workspace "{{.WORKSPACE}}"

  mcp:
    desc: Launch the MCP agent interface for the dev workspace.
    interactive: true
    deps: [modules:build]
    env:
      HOVEL_MODULE_CONFIG: '{{.MODULE_CONFIG}}'
    cmds:
      - bazel run //cmd/hovel -- mcp --workspace "{{.WORKSPACE}}" --transport http --http-addr 127.0.0.1:27166 --entity-id agent1

  status:
    aliases: [st]
    desc: Show daemon status for the dev workspace.
    cmds:
      - bazel run //cmd/hovel -- status --workspace "{{.WORKSPACE}}"

  init:
    desc: Initialize the dev workspace (./.hovel).
    cmds:
      - bazel run //cmd/hovel -- init --workspace "{{.WORKSPACE}}"

  throw:
    desc: 'One-shot throw of a saved chain file: task throw -- path/to/chain.yaml.'
    deps: [modules:build]
    env:
      HOVEL_MODULE_CONFIG: '{{.MODULE_CONFIG}}'
    cmds:
      - bazel run //cmd/hovel -- throw {{.CLI_ARGS}} --workspace "{{.WORKSPACE}}"

  lab:etro-squatter-bind:
    desc: Throw the representative Etro -> Squatter TCP bind lab chain against HOVEL_LAB_TARGET_HOST.
    deps: [modules:build]
    env:
      HOVEL_MODULE_CONFIG: '{{.MODULE_CONFIG}}'
      HOVEL_WORKSPACE: '{{.WORKSPACE}}'
    cmds:
      - bash tools/lab/etro_squatter_bind.sh

  clean:
    desc: Remove local dev state (./.hovel workspace and .task cache). Leaves the Bazel cache alone.
    cmds:
      - rm -rf "{{.WORKSPACE}}" .task

  reset:
    aliases: [fresh]
    desc: Wipe local dev state, then launch a fresh interactive CLI.
    cmds:
      - task: clean
      - task: start

  # --- Build, test, run ---------------------------------------------------

  build:
    aliases: [b]
    desc: Build Bazel targets (default //...; e.g. task build -- //cmd/hovel).
    cmds:
      - bazel build {{.CLI_ARGS | default "//..."}}

  test:
    aliases: [t]
    desc: Run Bazel tests (default //...; e.g. task test -- //internal/domain/...).
    cmds:
      - bazel test {{.CLI_ARGS | default "//..."}}

  run:
    desc: 'Run any Bazel target: task run -- //cmd/hovel -- daemon status.'
    env:
      HOVEL_MODULE_CONFIG: '{{.MODULE_CONFIG}}'
    cmds:
      - bazel run {{.CLI_ARGS}}

  go:deps:
    desc: 'Add or update Go module dependencies: task go:deps -- module@version.'
    cmds:
      - 'test -n "{{.CLI_ARGS}}" || { echo "usage: task go:deps -- module@version"; exit 2; }'
      - go get {{.CLI_ARGS}}
      - go mod tidy

  modules:build:
    aliases: [modules]
    desc: Build the Go and Rust example modules and stage their binaries to examples/bin/.
    cmds:
      - bash tools/modules/stage_examples.sh

  modules:package:
    desc: Build example module .tgz packages and a module index into dist/modules/.
    deps: [modules:build]
    cmds:
      - python3 tools/modules/package_examples.py

  upver:
    desc: 'Update Hovel and hovel-sdk versions: task upver -- 0.2.0.'
    cmds:
      - python3 tools/release/upver.py {{.CLI_ARGS}}

  upver:test:
    desc: Check the version updater.
    cmds:
      - python3 tools/release/upver_test.py

  docs:
    desc: Build cached demos, then build and stage the static docs site.
    cmds:
      - task: demos
      - task: demo:squatter-wine
      - task: docs:stage

  docs:stage:
    desc: Build and stage the static docs site from existing demo outputs.
    cmds:
      - bash tools/docs/stage_site.sh

  demos:
    desc: Materialize Bazel-cached VHS terminal demos into demo/out/.
    cmds:
      - bash scripts/generate-demos.sh

  demo:squatter-wine:
    desc: Materialize the Bazel-cached Docker/Wine Squatter MCP demo GIF.
    cmds:
      - bash scripts/generate-squatter-wine-demo.sh

  docs:api:
    desc: Generate language-native SDK API docs into _site/api/sdk.
    cmds:
      - mkdir -p _site
      - python3 tools/docs/generate_sdk_api_docs.py --site-root "$PWD/_site" --output "$PWD/_site/api/sdk"

  # --- Release artifacts -------------------------------------------------

  release:hovel-wheel:
    desc: Build the PyPI wheel that packages the Hovel Go binary.
    cmds:
      - task build -- //cmd/hovel
      - python3 tools/release/build_hovel_wheel.py

  release:hovel-wheels:
    desc: Cross-build all Hovel PyPI wheels from Linux through Bazel.
    cmds:
      - task build -- //cmd/hovel:hovel_linux_amd64
      - python3 tools/release/build_hovel_wheel.py --binary bazel-bin/cmd/hovel/hovel-linux-amd64 --platform-tag manylinux_2_28_x86_64 --binary-name hovel
      - task build -- //cmd/hovel:hovel_darwin_arm64
      - python3 tools/release/build_hovel_wheel.py --binary bazel-bin/cmd/hovel/hovel-darwin-arm64 --platform-tag macosx_11_0_arm64 --binary-name hovel
      - task build -- //cmd/hovel:hovel_windows_amd64
      - python3 tools/release/build_hovel_wheel.py --binary bazel-bin/cmd/hovel/hovel-windows-amd64.exe --platform-tag win_amd64 --binary-name hovel.exe

  release:hovel-sdk-dist:
    desc: Build the hovel-sdk PyPI wheel and sdist.
    cmds:
      - uv build --project sdk/python --out-dir dist

  # --- Checks (what CI runs) ----------------------------------------------

  check:
    aliases: [ci]
    desc: Run lint, docs, build, test, race, fuzz smoke, and coverage.
    cmds:
      - task: lint
      - task: upver:test
      - task: actions:summary:test
      - task: docs
      - task: build
      - task: test
      - task: test:race
      - task: fuzz:smoke
      - task: coverage

  actions:summary:
    desc: Append a GitHub Actions job summary for a named workflow job.
    cmds:
      - python3 tools/ci/job_summary.py {{.CLI_ARGS}}

  actions:summary:test:
    desc: Check the GitHub Actions job summary renderer.
    cmds:
      - python3 tools/ci/job_summary_test.py

  coverage:
    desc: Run coverage ratchets for domain, app, and Python SDK layers.
    cmds:
      - python3 tools/tests/check_coverage.py

  coverage:go:
    desc: Run Bazel merged LCOV coverage for Go targets.
    cmds:
      - bazel coverage --combined_report=lcov {{.CLI_ARGS}}

  test:race:
    desc: Run Go race-detector tests for the application service layer.
    cmds:
      - task: test
        vars:
          CLI_ARGS: --@rules_go//go/config:race //internal/app/...

  fuzz:smoke:
    desc: Run short fuzz smoke coverage for pure domain parsers.
    cmds:
      - mkdir -p /tmp/hovel-fuzz-cache
      - task: test
        vars:
          CLI_ARGS: --test_arg=-test.fuzz=FuzzNewTypeNeverAcceptsUntrimmedOrSingleSegmentValues --test_arg=-test.fuzztime=5s --test_arg=-test.fuzzcachedir=/tmp/hovel-fuzz-cache //internal/domain/event:event_test

  lint:
    aliases: [l]
    desc: Run all lint checks (Go formatting, Gazelle, Python, Squatter C).
    cmds:
      - task: gofmt:check
      - task: gazelle:check
      - task: python:check
      - task: squatter:check

  fmt:
    aliases: [format]
    desc: Auto-format the tree (Go source, Gazelle BUILD metadata, Squatter C).
    cmds:
      - task: gofmt
      - task: gazelle
      - task: squatter:format

  # --- Individual quality steps (composed by lint/fmt above) --------------

  gofmt:
    desc: Format Go files in place.
    cmds:
      - bash tools/lint/gofmt_all.sh

  gofmt:check:
    desc: Check Go formatting.
    cmds:
      - bash tools/lint/check_gofmt.sh

  gazelle:
    desc: Update Go BUILD metadata with Gazelle.
    cmds:
      - bazel run //:gazelle

  gazelle:check:
    desc: Check that Go BUILD metadata is up to date.
    cmds:
      - bazel run //:gazelle -- -mode=diff

  python:check:
    desc: Run Python lint, type, and doc checks.
    cmds:
      - bash tools/lint/check_python.sh

  squatter:check:
    desc: Run Squatter C static analysis.
    cmds:
      - task: squatter:format:check
      - task: squatter:complexity
      - task: squatter:cppcheck
      - task: squatter:clang-tidy

  squatter:test:wine:
    desc: Run Squatter Windows C++ and functional tests under Wine.
    cmds:
      - task: test
        vars:
          CLI_ARGS: --config=win64 //payloads/squatter/tests/...
      - task: test
        vars:
          CLI_ARGS: --test_env=HOVEL_SQUATTER_REQUIRE_WINE=1 //payloads/squatter/client/functest:functest_test

  squatter:format:
    desc: Format Squatter C sources with clang-format.
    cmds:
      - |
        sources="$(tools/lint/squatter_sources.sh | sed "s#^#$PWD/#")"
        bazel run //tools/lint:clang_format -- -i $sources

  squatter:format:check:
    desc: Check Squatter C formatting with clang-format.
    cmds:
      - |
        sources="$(tools/lint/squatter_sources.sh | sed "s#^#$PWD/#")"
        bazel run //tools/lint:clang_format -- --dry-run --Werror $sources

  squatter:complexity:
    desc: Check Squatter C cyclomatic complexity with lizard (CCN <= 10).
    cmds:
      - bash tools/lint/check_squatter_complexity.sh

  squatter:cppcheck:
    desc: Run cppcheck over Squatter C sources.
    cmds:
      - bash tools/lint/check_squatter_cppcheck.sh

  squatter:clang-tidy:
    desc: Run clang-tidy over Squatter C sources.
    vars:
      CLANG_TIDY_VERSION:
        sh: clang-tidy --version | python3 -c 'import hashlib, sys; print(hashlib.sha256(sys.stdin.buffer.read()).hexdigest())'
    cmds:
      - task: build
        vars:
          CLI_ARGS: --action_env=HOVEL_CLANG_TIDY_VERSION={{.CLANG_TIDY_VERSION}} //payloads/squatter/windows/src:clang_tidy

  # --- Git hooks ----------------------------------------------------------

  hooks:install:
    desc: Install Git hooks through Lefthook.
    cmds:
      - lefthook install

  precommit:
    aliases: [pre-commit]
    desc: Fast checks run by the Lefthook pre-commit hook (lint + build).
    cmds:
      - task: lint
      - task: build

  prepush:
    aliases: [pre-push]
    desc: Thorough checks run by the Lefthook pre-push hook (tests).
    cmds:
      - task: test
