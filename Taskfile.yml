version: '3'

# Root dispatcher for the reorganized repository. Keep this file small and
# partial-checkout tolerant; concrete build systems live in their slices.

env:
  PYTHONDONTWRITEBYTECODE: '1'

vars:
  REPO_ROOT:
    sh: python3 -c 'from pathlib import Path; print((Path("{{.TASKFILE_DIR}}") / "Taskfile.yml").resolve().parent)'
  BAZEL_STARTUP_ARGS:
    sh: echo "${HOVEL_BAZEL_STARTUP_ARGS:-}"
  BAZEL_ARGS:
    sh: |
      if [ -n "${HOVEL_BAZEL_ARGS:-}" ]; then
        echo "${HOVEL_BAZEL_ARGS}"
        exit 0
      fi
      if [ -n "${CI:-}" ] || [ -n "${GITHUB_ACTIONS:-}" ]; then
        echo "--config=ci"
        exit 0
      fi
      config_file="{{.REPO_ROOT}}/.hovel-bazel-config"
      if [ ! -f "$config_file" ]; then
        echo ""
        exit 0
      fi
      mode="$(tr -d '[:space:]' < "$config_file")"
      case "$mode" in
        local) echo "--config=local-cache" ;;
        nativelink) echo "--config=nativelink" ;;
        nativelink-minimal) echo "--config=nativelink-minimal" ;;
        buildbuddy) echo "--config=buildbuddy" ;;
        "") echo "" ;;
        *) echo "unknown Bazel config mode in $config_file: $mode" >&2; exit 2 ;;
      esac
  PICBLOBS_BUILDIFIER_VERSION: '8.5.1'

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list
    silent: true

  checkout:status:
    desc: Show which checkout slices are present.
    cmds:
      - python3 repo-tools/tasks/checkout.py status

  checkout:require-full:
    desc: Fail unless this is a full checkout.
    cmds:
      - python3 repo-tools/tasks/checkout.py require

  config-local:
    desc: Use the shared local on-disk Bazel cache for local task builds.
    silent: true
    cmds:
      - printf 'local\n' > "{{.REPO_ROOT}}/.hovel-bazel-config"
      - task: config-show

  config-nativelink:
    desc: Use the shared local on-disk Bazel cache plus NativeLink remote execution.
    silent: true
    cmds:
      - printf 'nativelink\n' > "{{.REPO_ROOT}}/.hovel-bazel-config"
      - task: config-show

  config-nativelink-minimal:
    desc: Use NativeLink remote execution and avoid downloading build outputs unless needed.
    silent: true
    cmds:
      - printf 'nativelink-minimal\n' > "{{.REPO_ROOT}}/.hovel-bazel-config"
      - task: config-show

  config-buildbuddy:
    desc: Use BuildBuddy cache for local task builds.
    silent: true
    cmds:
      - printf 'buildbuddy\n' > "{{.REPO_ROOT}}/.hovel-bazel-config"
      - task: config-show

  config-show:
    desc: Show the effective Bazel config used by task wrappers.
    silent: true
    cmds:
      - |
        config_file="{{.REPO_ROOT}}/.hovel-bazel-config"
        if [ -n "${HOVEL_BAZEL_ARGS:-}" ]; then
          echo "source: HOVEL_BAZEL_ARGS"
          echo "args: ${HOVEL_BAZEL_ARGS}"
        elif [ -n "${CI:-}" ] || [ -n "${GITHUB_ACTIONS:-}" ]; then
          echo "source: CI environment"
          echo "mode: ci"
          echo "args: --config=ci"
        elif [ -f "$config_file" ]; then
          mode="$(tr -d '[:space:]' < "$config_file")"
          case "$mode" in
            local) args="--config=local-cache" ;;
            nativelink) args="--config=nativelink" ;;
            nativelink-minimal) args="--config=nativelink-minimal" ;;
            buildbuddy) args="--config=buildbuddy" ;;
            "") args="" ;;
            *) echo "unknown Bazel config mode in $config_file: $mode" >&2; exit 2 ;;
          esac
          echo "source: $config_file"
          echo "mode: ${mode:-none}"
          echo "args: ${args:-<none>}"
        else
          echo "source: default"
          echo "mode: none"
          echo "args: <none>"
        fi

  check:
    desc: Run checks for the repository slices present in this checkout.
    cmds:
      - python3 repo-tools/tasks/checkout.py check

  ci:
    desc: Run the remote-compatible full-checkout gate.
    cmds:
      - task: checkout:require-full
      - task: repo:quality
      - task: core:ci
      - task: sdk:ci
      - task: modules:ci
      - task: docs:check

  ci:report:
    desc: Run the full-checkout gate, host demos, and a static HTML test report.
    cmds:
      - task: checkout:require-full
      - task: test:report
      - task: core:ci
      - task: sdk:ci
      - task: modules:ci
      - task: docs:ci

  build:
    desc: Build the core Hovel binary workspace.
    cmds:
      - task core:build -- {{.CLI_ARGS}}

  test:
    desc: Test the core Hovel binary workspace.
    cmds:
      - task core:test -- {{.CLI_ARGS}}

  run:
    desc: Run an arbitrary core Bazel target.
    dir: core
    env:
      HOVEL_REPO_ROOT: '{{.REPO_ROOT}}'
    cmds:
      - task run -- {{.CLI_ARGS}}

  go:deps:
    desc: 'Add or update root integration Go dependencies: task go:deps -- module@version.'
    dir: third_party/go_deps
    cmds:
      - 'test -n "{{.CLI_ARGS}}" || { echo "usage: task go:deps -- module@version"; exit 2; }'
      - go get {{.CLI_ARGS}}
      - go mod tidy

  python:deps:
    desc: Update uv project locks and hashed Bazel Python requirements.
    cmds:
      - task bazel:run -- //repo-tools/deps:update_python_locks

  ui:demo:
    desc: Run all terminal UI catalog demos from core.
    dir: core
    interactive: true
    cmds:
      - task ui:demo -- {{.CLI_ARGS}}

  lint:
    desc: Run core lint checks.
    dir: core
    cmds:
      - task lint

  fmt:
    desc: Format slices with wired formatters.
    cmds:
      - task core:fmt
      - task sdk:fmt

  coverage:
    desc: Run core coverage ratchets.
    dir: core
    cmds:
      - task coverage

  bazel:build:
    desc: Build root integration Bazel targets for non-core slices.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - bazel {{.BAZEL_STARTUP_ARGS}} build {{.BAZEL_ARGS}} {{.CLI_ARGS}}

  bazel:test:
    desc: Test root integration Bazel targets for non-core slices.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - bazel {{.BAZEL_STARTUP_ARGS}} test {{.BAZEL_ARGS}} {{.CLI_ARGS}}

  bazel:run:
    desc: Run root integration Bazel targets for non-core slices.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - bazel {{.BAZEL_STARTUP_ARGS}} run {{.BAZEL_ARGS}} {{.CLI_ARGS}}

  bazel:query:
    desc: Run a root integration Bazel query.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - bazel {{.BAZEL_STARTUP_ARGS}} query {{.BAZEL_ARGS}} {{.CLI_ARGS}}

  bazel:cquery:
    desc: Run a root integration Bazel configured query.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - bazel {{.BAZEL_STARTUP_ARGS}} cquery {{.BAZEL_ARGS}} {{.CLI_ARGS}}

  bazel:aquery:
    desc: Run a root integration Bazel action query.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - bazel {{.BAZEL_STARTUP_ARGS}} aquery {{.BAZEL_ARGS}} {{.CLI_ARGS}}

  bazel:mod:
    desc: Run a root integration Bazel module graph command.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - bazel {{.BAZEL_STARTUP_ARGS}} mod {{.CLI_ARGS}}

  bazel:clean:
    desc: Clean root integration Bazel outputs.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - bazel {{.BAZEL_STARTUP_ARGS}} clean

  bazel:clean-expunge:
    desc: Expunge root integration Bazel outputs.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - bazel {{.BAZEL_STARTUP_ARGS}} clean --expunge

  report:generate:
    desc: Generate the static HTML test report from existing BEP/testlog artifacts.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: >-
            //tools/testreport:render_report --
            --output=.test-report/site
            --bep=.test-report/bep/core.json
            --bep=.test-report/bep/root.json
            --bep=.test-report/bep/picblobs.json
            --scan-testlogs=core/bazel-testlogs
            --scan-testlogs=bazel-testlogs

  graph:deps:
    desc: Render a bounded dependency graph to graph.dot; usage task graph:deps -- //path/to:target.
    cmds:
      - |
        test -n "{{.CLI_ARGS}}" || { echo "usage: task graph:deps -- //path/to:target"; exit 2; }
        task bazel:query -- --notool_deps --noimplicit_deps 'deps({{.CLI_ARGS}})' --output=graph > "{{.OUT | default "graph.dot"}}"

  graph:rdeps:
    desc: Query reverse dependencies; usage task graph:rdeps -- //path/to:target.
    cmds:
      - |
        test -n "{{.CLI_ARGS}}" || { echo "usage: task graph:rdeps -- //path/to:target"; exit 2; }
        task bazel:query -- 'rdeps(//..., {{.CLI_ARGS}})'

  graph:why:
    desc: Explain why one target depends on another; usage task graph:why -- //from:target //to:target.
    cmds:
      - |
        set -- {{.CLI_ARGS}}
        test "$#" -eq 2 || { echo "usage: task graph:why -- //from:target //to:target"; exit 2; }
        task bazel:query -- "somepath($1, $2)"

  policy:check:
    desc: Run all repository architecture policy checks.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //tools/bazel/policy:repo_policy

  policy:layers:
    desc: Check core production layering policy.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //tools/bazel/policy:repo_policy -- --check=layers

  visibility:check:
    desc: Check enforced Bazel visibility policy.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //tools/bazel/policy:repo_policy -- --check=visibility

  ownership:check:
    desc: Check repository ownership anchors.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //tools/bazel/policy:repo_policy -- --check=ownership

  buildifier:check:
    desc: Check repository BUILD, MODULE, and Starlark formatting with pinned buildifier.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //tools/bazel/buildifier:buildifier -- --mode=check

  buildifier:fix:
    desc: Format repository BUILD, MODULE, and Starlark files with pinned buildifier.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //tools/bazel/buildifier:buildifier -- --mode=fix {{.CLI_ARGS}}

  repo:quality:
    desc: Run repo-wide Bazel policy and BUILD/Starlark hygiene checks.
    cmds:
      - task: buildifier:check
      - task: policy:check
      - task: bazel:test
        vars:
          CLI_ARGS: //:repo_quality_test

  test:report:
    desc: Run wired monorepo test suites and generate the static HTML test report.
    cmds:
      - |
        mkdir -p .test-report/bep
        status=0
        task core:test -- --test_strategy=standalone --nocache_test_results --remote_download_outputs=all --build_event_json_file=../.test-report/bep/core.json //:test //:race_test //:fuzz_smoke_test || status=$?
        task bazel:test -- --test_strategy=standalone --nocache_test_results --remote_download_outputs=all --build_event_json_file=.test-report/bep/root.json //:sdk_test //:modules_test //:module_examples_test //:docs_test || status=$?
        task picblobs:bazel-test -- --test_strategy=standalone --nocache_test_results --remote_download_outputs=all --build_event_json_file=.test-report/bep/picblobs.json || status=$?
        task report:generate || status=$?
        exit "$status"

  upver:
    desc: Update the lockstep Hovel core and SDK version.
    dir: core
    cmds:
      - task upver -- {{.CLI_ARGS}}

  upver:test:
    desc: Check the lockstep Hovel version updater.
    dir: core
    cmds:
      - task upver:test

  picblobs:upver:
    desc: Update the independent picblobs package version.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //modules/picblobs/tools:update_version -- {{.CLI_ARGS}}

  picblobs:upver:test:
    desc: Check the independent picblobs version updater.
    cmds:
      - task: bazel:test
        vars:
          CLI_ARGS: --config=picblobs_ci --test_arg=--pytest-target=test_update_version.py //modules/picblobs/python:pytest_suite

  release:picblobs-dist:
    desc: Stage release blobs and build the picblobs PyPI source/wheel distributions.
    cmds:
      - task: picblobs:stage-release
      - task: picblobs:dist-picblobs
        vars:
          EXPECTED_VERSION: '{{.EXPECTED_VERSION}}'

  release:picblobs-cli-dist:
    desc: Stage release blobs/runners and build the picblobs-cli PyPI source/wheel distributions.
    cmds:
      - task: picblobs:stage
      - task: picblobs:dist-picblobs
        vars:
          EXPECTED_VERSION: '{{.EXPECTED_VERSION}}'
      - task: picblobs:dist-cli
        vars:
          EXPECTED_VERSION: '{{.EXPECTED_VERSION}}'

  release:hovel-wheel:
    desc: Build the PyPI wheel that packages the Hovel Go binary.
    dir: core
    cmds:
      - task release:hovel-wheel

  release:hovel-wheels:
    desc: Cross-build all Hovel PyPI wheels from Linux through Bazel.
    dir: core
    cmds:
      - task release:hovel-wheels

  release:hovel-sdk-dist:
    desc: Build the Python SDK source and wheel distributions.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //sdk/python:build_dist -- --out-dir=dist --clean

  release:modules-stage:
    desc: Stage in-repo module binaries into modules/examples/bin.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //modules/tools:stage_examples

  release:modules-package:
    desc: Build in-repo module release packages and indexes into dist/modules.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //modules/tools:package_examples

  actions:summary:
    desc: Append a GitHub Actions job summary for wired core jobs.
    dir: core
    cmds:
      - task actions:summary -- {{.CLI_ARGS}}

  actions:configure-bazel-cache:
    desc: Configure Task/Bazel CI cache env for GitHub Actions jobs.
    cmds:
      - python3 repo-tools/tasks/configure_bazel_cache.py

  actions:summary:test:
    desc: Check the GitHub Actions summary renderer.
    dir: core
    cmds:
      - task actions:summary:test

  core:build:
    desc: Build the core Hovel binary workspace.
    dir: core
    cmds:
      - task build -- {{.CLI_ARGS}}

  core:test:
    desc: Test the core Hovel binary workspace.
    dir: core
    cmds:
      - task test -- {{.CLI_ARGS}}

  core:check:
    desc: Check the core Hovel binary workspace.
    dir: core
    cmds:
      - task check

  core:bazel:mod:
    desc: Run a core Bazel module graph command.
    dir: core
    cmds:
      - task bazel:mod -- {{.CLI_ARGS}}

  core:ci:
    desc: Run the core Hovel binary workspace CI gate.
    dir: core
    cmds:
      - task ci

  core:fmt:
    desc: Format the core Hovel binary workspace.
    dir: core
    cmds:
      - task fmt

  sdk:fmt:
    desc: Format SDK sources with wired formatters.
    cmds:
      - task: run
        vars:
          CLI_ARGS: //tools/lint:ruff -- check --fix-only --config sdk/python/pyproject.toml sdk/python/hovel_sdk modules/examples/python
      - task: run
        vars:
          CLI_ARGS: //tools/lint:ruff -- format --config sdk/python/pyproject.toml sdk/python/hovel_sdk modules/examples/python
      - task: run
        vars:
          CLI_ARGS: //tools/lint:gofmt_workspace -- --mode=write --path ../sdk/go/hovel
      - task: run
        vars:
          CLI_ARGS: //tools/lint:format_rust_workspace -- --mode=write

  sdk:lint:
    desc: Run SDK Python lint/type/docs checks and Rust formatting checks.
    cmds:
      - task: run
        vars:
          CLI_ARGS: //tools/lint:python_check
      - task: run
        vars:
          CLI_ARGS: //tools/lint:format_rust_workspace -- --mode=check

  sdk:build:
    desc: Build SDK targets in the root integration workspace.
    cmds:
      - task: bazel:build
        vars:
          CLI_ARGS: //:sdk_build

  sdk:test:
    desc: Test SDK targets in the root integration workspace.
    cmds:
      - task: bazel:test
        vars:
          CLI_ARGS: //:sdk_test

  sdk:ci:
    desc: Run the SDK slice CI gate.
    cmds:
      - task: sdk:lint
      - task: sdk:build
      - task: sdk:test

  modules:build:
    desc: Build module targets that do not require dedicated platform configs.
    cmds:
      - task: bazel:build
        vars:
          CLI_ARGS: //:modules_build

  picblobs:setup:
    desc: No-op; Picblobs tools are Bazel-managed.
    cmds:
      - task: picblobs:generate-check

  picblobs:fmt:
    desc: Format picblobs C, Python, and Bazel files.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //modules/picblobs/tools:format_write -- {{.CLI_ARGS}}

  picblobs:fmt-check:
    desc: Check picblobs formatting without modifying files.
    cmds:
      - task: bazel:test
        vars:
          CLI_ARGS: --config=picblobs_quality //modules/picblobs/tools:format_check

  picblobs:lint:
    desc: Run picblobs Python and Bazel lint checks.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //modules/picblobs/tools:lint_run -- {{.CLI_ARGS}}

  picblobs:lint-check:
    desc: Run picblobs lint checks in CI/check mode.
    cmds:
      - task: bazel:test
        vars:
          CLI_ARGS: --config=picblobs_quality //modules/picblobs/tools:lint_check

  picblobs:generate:
    desc: Regenerate picblobs derived files from the registry.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //modules/picblobs/tools:generate_write

  picblobs:generate-check:
    desc: Verify picblobs generated files are fresh.
    cmds:
      - task: bazel:test
        vars:
          CLI_ARGS: --config=picblobs_quality //modules/picblobs/tools:generate_check

  picblobs:module-lock:
    desc: Refresh the standalone picblobs Bazel module lock.
    dir: '{{.REPO_ROOT}}/modules/picblobs'
    cmds:
      - bazel {{.BAZEL_STARTUP_ARGS}} mod deps

  picblobs:mbed-blobs:
    desc: Materialize configured Cortex-M4 NaCl blob headers for the Mbed OS PoC.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: --config=picblobs_cross //modules/picblobs/mbed:materialize_blobs -- {{.CLI_ARGS}}

  picblobs:mbed-compile:
    desc: Compile the PoC against the pinned Mbed OS 5.15.9 target SDK.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: --config=picblobs_cross //modules/picblobs/mbed:compile_mbed_os -- {{.CLI_ARGS}}

  picblobs:bazel-build:
    desc: Build representative picblobs Bazel targets across platform configs.
    cmds:
      - task: bazel:build
        vars:
          CLI_ARGS: //modules/picblobs/provider:picblobs-provider
      - task: bazel:build
        vars:
          CLI_ARGS: >-
            --config=picblobs_ci --config=linux_x86_64 --
            //modules/picblobs/src/...
            //modules/picblobs/tests/runners/linux/...
            -//modules/picblobs/tests/runners/linux:runner_cppcheck
      - task: bazel:build
        vars:
          CLI_ARGS: --config=picblobs_ci --config=linux_aarch64 //modules/picblobs/src/...
      - task: bazel:build
        vars:
          CLI_ARGS: --config=picblobs_ci --config=windows_x86_64 //modules/picblobs/src/payload:hello_windows
      - task: bazel:build
        vars:
          CLI_ARGS: --config=picblobs_ci --config=freebsd_x86_64 //modules/picblobs/src/payload:hello

  picblobs:bazel-test:
    desc: Run picblobs Bazel tests.
    cmds:
      - task: bazel:test
        vars:
          CLI_ARGS: //modules/picblobs/provider:provider_test
      - task: bazel:test
        vars:
          CLI_ARGS: --config=picblobs_ci {{.CLI_ARGS}} //modules/picblobs:bazel_test_suite

  picblobs:stage:
    desc: Build and stage picblobs blobs, runners, and verifier fixtures.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: --config=picblobs_cross //modules/picblobs/tools:stage_blobs -- {{.CLI_ARGS}}

  picblobs:stage-release:
    desc: Build and stage release picblobs blobs without CLI runners.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: --config=picblobs_cross //modules/picblobs/tools:stage_blobs_release -- {{.CLI_ARGS}}

  picblobs:provider-stage:
    desc: Build and stage the Hovel picblobs payload-provider binary.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //modules/picblobs/tools:stage_hovel_provider

  picblobs:test:
    desc: Run the Bazel-integrated picblobs test suite.
    cmds:
      - task: picblobs:bazel-test
        vars:
          CLI_ARGS: '{{.CLI_ARGS}}'

  picblobs:dist:
    desc: Build and validate picblobs and picblobs-cli distributions.
    cmds:
      - task: picblobs:dist-picblobs
      - task: picblobs:dist-cli

  picblobs:dist-picblobs:
    desc: Build and validate only the picblobs distribution.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: >-
            //modules/picblobs/tools:build_dist --
            --package=picblobs
            --out-dir=modules/picblobs/dist/picblobs
            --clean
            --validate{{if .EXPECTED_VERSION}}
            --expected-version={{.EXPECTED_VERSION}}{{end}}

  picblobs:dist-cli:
    desc: Build and validate only the picblobs-cli distribution.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: >-
            //modules/picblobs/tools:build_dist --
            --package=picblobs-cli
            --out-dir=modules/picblobs/dist/picblobs-cli
            --clean
            --validate{{if .EXPECTED_VERSION}}
            --expected-version={{.EXPECTED_VERSION}}{{end}}

  picblobs:ci:
    desc: Run the picblobs module CI gate.
    cmds:
      - task: picblobs:bazel-build
      - task: picblobs:bazel-test

  modules:examples:build:
    desc: Build Go, Python, and Rust example module targets.
    cmds:
      - task: bazel:build
        vars:
          CLI_ARGS: //:module_examples_build

  modules:examples:test:
    desc: Test Go, Python, and Rust example module targets.
    cmds:
      - task: bazel:test
        vars:
          CLI_ARGS: //:module_examples_test

  modules:examples:ci:
    desc: Run the example module slice CI gate.
    cmds:
      - task: modules:examples:build
      - task: modules:examples:test

  modules:test:
    desc: Test example/module packaging and Squatter provider targets.
    cmds:
      - task: bazel:test
        vars:
          CLI_ARGS: //:modules_test

  modules:wine-test:
    desc: Run Squatter Windows tests under Wine.
    cmds:
      - task: bazel:test
        vars:
          CLI_ARGS: --platforms=//platforms:windows_x86 --extra_toolchains=@mingw_i686//:toolchain --run_under=wine //:modules_wine_test

  modules:ci:
    desc: Run the modules slice CI gate.
    cmds:
      - task: modules:build
      - task: modules:test
      - task: picblobs:ci

  docs:build:
    desc: Build the docs site staging tool.
    cmds:
      - task: bazel:build
        vars:
          CLI_ARGS: //:docs_build

  docs:test:
    desc: Test docs helpers and standard verification flows.
    cmds:
      - task: bazel:test
        vars:
          CLI_ARGS: //:docs_test

  docs:demos:
    desc: Render and materialize docs demo GIFs.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //docs/tools/demo:materialize_docs_demo_outputs

  docs:demos:wine:
    desc: Render and materialize the Squatter Wine docs demo GIF.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //docs/tools/demo:materialize_squatter_wine_demo_outputs

  docs:demos:all:
    desc: Render and materialize all docs demo GIFs, including host-service demos.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //docs/tools/demo:materialize_all_demo_outputs

  docs:stage:
    desc: Stage the GitHub Pages site into _site.
    cmds:
      - task: bazel:run
        vars:
          CLI_ARGS: //docs/tools/docs:stage_site

  docs:check:
    desc: Run the remote-compatible docs verification gate.
    cmds:
      - task: docs:test

  docs:site:
    desc: Render host-service demos and stage the complete docs site.
    cmds:
      - task: docs:demos:all
      - task: docs:stage

  docs:ci:
    desc: Run remote-compatible docs checks plus host-service site rendering.
    cmds:
      - task: docs:check
      - task: docs:site

  start:
    aliases: [dev, up, cli]
    desc: Build and launch the interactive Hovel CLI from core.
    dir: core
    interactive: true
    cmds:
      - task start

  daemon:
    desc: Run hoveld from core.
    dir: core
    interactive: true
    cmds:
      - task daemon

  mcp:
    desc: Launch the MCP agent interface from core.
    dir: core
    interactive: true
    cmds:
      - task mcp

  status:
    aliases: [st]
    desc: Show daemon status for the dev workspace.
    dir: core
    cmds:
      - task status

  init:
    desc: Initialize the dev workspace.
    dir: core
    cmds:
      - task init
