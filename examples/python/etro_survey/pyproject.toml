[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "hovel-etro-survey"
version = "0.0.0"
description = "Hovel survey module: SMBv1 (MS17-010 / EternalRomance) vulnerability touch"
requires-python = ">=3.12"
dependencies = ["hovel-sdk"]

[project.scripts]
hovel-etro-survey = "hovel_etro_survey.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["hovel_etro_survey*"]
