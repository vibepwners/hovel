[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "hovel-ms17-010-survey"
version = "0.0.0"
description = "Hovel survey module: SMBv1 MS17-010 vulnerability touch"
requires-python = ">=3.12"
dependencies = ["hovel-sdk"]

[project.scripts]
hovel-ms17-010-survey = "hovel_ms17_010_survey.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["hovel_ms17_010_survey*"]
