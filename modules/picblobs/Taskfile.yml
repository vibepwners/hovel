# Taskfile — the single, canonical way to run every repo workflow.
# https://taskfile.dev   (install: https://taskfile.dev/installation/)
#
# Run `task` (or `task --list`) to see everything. Bazel-backed workflows
# delegate through the repository root Taskfile so root config selection
# (`task config-nativelink`, CI config, and HOVEL_BAZEL_ARGS) is honored.
#
# Pass extra args after `--`, e.g. `task test -- --test_arg=-k --test_arg=extract`.

version: '3'

vars:
  REPO_ROOT: '{{.TASKFILE_DIR}}/../..'

tasks:
  default:
    desc: "List all tasks"
    silent: true
    cmds:
      - task --list

  # ---------------------------------------------------------------- setup ---
  setup:
    desc: "No-op; tools are provided by Bazel-managed targets."
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:generate-check

  # ------------------------------------------------------ format & lint ---
  fmt:
    desc: "Format C, Python, and Bazel files in place"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:fmt -- {{.CLI_ARGS}}

  fmt:check:
    desc: "Check formatting without modifying (fails if anything is unformatted)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:fmt-check

  lint:
    desc: "Lint Python (ruff) + complexity (lizard) + Bazel (buildifier)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:lint -- {{.CLI_ARGS}}

  lint:check:
    desc: "Lint in check mode (CI parity; non-mutating)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:lint-check

  lint:c:
    desc: "C static analysis (clang-tidy) via the Bazel lint aspect"
    env:
      PICBLOBS_REQUIRE_LINT_TOOLS: '1'
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:build -- --config=picblobs_lint //modules/picblobs/src/... //modules/picblobs/tests/...

  lint:init:
    desc: "Detect uninitialized local declarations (aggregates; --all for scalars)"
    env:
      PICBLOBS_REQUIRE_LINT_TOOLS: '1'
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:run -- //modules/picblobs/tools:init_check -- {{.CLI_ARGS}}

  # ----------------------------------------------------------- codegen ---
  generate:
    desc: "Regenerate all derived files from tools/registry.py"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:generate

  generate:check:
    desc: "Verify generated files are fresh (fails if stale)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:generate-check

  # -------------------------------------------------------------- check ---
  check:
    desc: "Run every non-mutating check: codegen freshness, format, lint, C lint"
    cmds:
      - task: generate:check
      - task: fmt:check
      - task: lint:check
      - task: lint:c

  # --------------------------------------------------------- build/stage ---
  build:
    desc: "Bazel-build the full release for one platform (PLATFORM=linux_x86_64 [MODE=debug|release])"
    vars:
      PLATFORM: '{{.PLATFORM | default "linux_x86_64"}}'
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:build -- --config={{.PLATFORM}}{{if .MODE}} --config={{.MODE}}{{end}} //modules/picblobs/release:full

  stage:
    desc: "Build every platform and stage blobs+runners into the package tree (= old ./buildall)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:stage -- {{.CLI_ARGS}}

  stage:release:
    desc: "Stage release blobs only, no runners (used by the release pipeline)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:stage-release -- {{.CLI_ARGS}}

  bazel:build:
    desc: "CI Bazel build matrix (src + runners across representative platforms)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:bazel-build

  bazel:test:
    desc: "Run the Bazel test suite (host tests)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:bazel-test -- {{.CLI_ARGS}}

  bazel:generate-check:
    desc: "Codegen freshness via Bazel (sandboxed; no venv needed)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:generate-check

  # --------------------------------------------------------------- tests ---
  test:
    desc: "Bazel-integrated test suite (args: task test -- --test_arg=-k --test_arg=foo)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:test -- {{.CLI_ARGS}}

  test:unit:
    desc: "Bazel-integrated Python and CLI tests."
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:test -- --config=picblobs_ci {{.CLI_ARGS}} //modules/picblobs/python:pytest_suite //modules/picblobs/python_cli:pytest_suite

  test:payload:
    desc: "Bazel-integrated payload and runner tests."
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:test -- --config=picblobs_ci {{.CLI_ARGS}} //modules/picblobs/tests:nacl_suite //modules/picblobs/tests/runners/...:all

  verify:
    desc: "End-to-end: run every staged blob via picblobs-cli"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:run -- //modules/picblobs/python_cli:picblobs-cli -- verify {{.CLI_ARGS}}

  # ----------------------------------------------------- version/release ---
  version:
    desc: "Set the project version everywhere (task version -- 0.2.0)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:upver -- {{.CLI_ARGS}}

  upver:
    desc: "Set the independent picblobs package version everywhere (task upver -- 0.2.0)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:upver -- {{.CLI_ARGS}}

  version:check:
    desc: "Verify all version strings agree (task version:check -- 0.1.4)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:run -- //modules/picblobs/tools:update_version -- --check {{.CLI_ARGS}}

  upver:test:
    desc: "Check the independent picblobs version updater."
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:upver:test

  release:extract:
    desc: "Extract staged .so blobs into the canonical release structure"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:run -- //modules/picblobs/tools:extract_release -- {{.CLI_ARGS}}

  release:extract:check:
    desc: "Verify the canonical release structure is up to date"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:run -- //modules/picblobs/tools:extract_release -- --check

  release:package:
    desc: "Package the canonical release structure into archives"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:run -- //modules/picblobs/tools:package_release -- {{.CLI_ARGS}}

  dist:picblobs:
    desc: "Build + validate the picblobs wheel/sdist (EXPECTED_VERSION= optional)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:dist-picblobs {{if .EXPECTED_VERSION}}EXPECTED_VERSION={{.EXPECTED_VERSION}}{{end}}

  dist:cli:
    desc: "Build + validate the picblobs-cli wheel/sdist (needs runners staged via `task stage`)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:dist-cli {{if .EXPECTED_VERSION}}EXPECTED_VERSION={{.EXPECTED_VERSION}}{{end}}

  dist:
    desc: "Build + validate BOTH package distributions (needs a full `task stage` first)"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:dist {{if .EXPECTED_VERSION}}EXPECTED_VERSION={{.EXPECTED_VERSION}}{{end}}

  # ---------------------------------------------------------------- misc ---
  wine:
    desc: "Validate Windows blobs under Wine"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:run -- //modules/picblobs/tools:validate_wine -- {{.CLI_ARGS}}

  dev:
    desc: "Drop into the Linux dev container (ci/dev.sh)"
    cmds:
      - 'ci/dev.sh {{.CLI_ARGS}}'

  docs:serve:
    desc: "Serve the static docs/ site locally at http://localhost:8000"
    dir: '{{.ROOT_DIR}}/docs'
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:run -- //modules/picblobs/tools:docs_server

  # ------------------------------------------------------------ ci/clean ---
  ci:
    desc: "Run the core CI gates locally (check + Bazel build/test). Excludes stage/test/verify (need QEMU)."
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" picblobs:ci

  clean:
    desc: "Remove build/dist artifacts and run the root Bazel clean task."
    cmds:
      - rm -rf dist build-artifacts debug
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:clean

  clean:all:
    desc: "Deep clean: expunge Bazel and wipe staged package data"
    cmds:
      - task -t "{{.REPO_ROOT}}/Taskfile.yml" bazel:clean-expunge
      - rm -rf dist build-artifacts debug
      - rm -rf python/picblobs/_blobs python/picblobs/blobs python/picblobs/manifest.json
      - rm -rf python_cli/picblobs_cli/_runners python_cli/picblobs_cli/_test_binaries
