min_version: "2.0.0"

pre-commit:
  jobs:
    - name: format-staged
      run: task fmt -- {staged_files}
      stage_fixed: true
    - name: lint-staged
      run: task lint -- {staged_files}

pre-push:
  parallel: true
  jobs:
    - name: format-check
      run: task fmt:check
    - name: lint-check
      run: task lint:check
    - name: c-lint-check
      run: task lint:c
