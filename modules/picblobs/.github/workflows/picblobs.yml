name: Release picblobs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (must match both pyproject files)
        required: true
        default: "0.1.7"
        type: string

concurrency:
  group: release-picblobs-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      PICBLOBS_ALLOW_UNPINNED_TOOLCHAINS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: astral-sh/setup-uv@v5

      - name: Resolve expected version
        id: version
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            EXPECTED_VERSION="${{ inputs.version }}"
          else
            EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "expected=${EXPECTED_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Install Bazel
        run: |
          BAZEL_VERSION="$(cat .bazelversion)"
          curl -fsSL \
            "https://github.com/bazelbuild/bazel/releases/download/${BAZEL_VERSION}/bazel-${BAZEL_VERSION}-linux-x86_64" \
            -o /tmp/bazel
          sudo install -m 0755 /tmp/bazel /usr/local/bin/bazel

      - name: Install Task + Python dev environment
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -b "$HOME/.local/bin" v3.51.1
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          source sourceme
          echo "${GITHUB_WORKSPACE}/python/.venv/bin" >> "${GITHUB_PATH}"

      - name: Verify release version wiring
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.expected }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          root = Path.cwd()
          lib = tomllib.loads((root / "python" / "pyproject.toml").read_text())["project"]["version"]
          cli = tomllib.loads((root / "python_cli" / "pyproject.toml").read_text())["project"]["version"]
          init = None
          for line in (root / "python" / "picblobs" / "__init__.py").read_text().splitlines():
              if line.startswith("__version__ = "):
                  init = line.split("=", 1)[1].strip().strip('"').strip("'")
                  break

          expected = os.environ["EXPECTED_VERSION"]
          assert init is not None
          assert lib == cli == init == expected, (lib, cli, init, expected)
          PY

      - name: Stage release blobs
        run: task stage:release

      - name: Build picblobs distributions
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.expected }}
        run: task dist:picblobs EXPECTED_VERSION="${EXPECTED_VERSION}"

      - name: Smoke-install the built wheel
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.expected }}
        run: |
          python -m venv /tmp/picblobs-publish-smoke
          /tmp/picblobs-publish-smoke/bin/python -m pip install --upgrade pip
          /tmp/picblobs-publish-smoke/bin/python -m pip install dist/picblobs/*.whl
          /tmp/picblobs-publish-smoke/bin/python - <<'PY'
          import os
          import picblobs

          assert picblobs.__version__ == os.environ["EXPECTED_VERSION"]
          assert picblobs.list_blobs()
          blob = picblobs.get_blob("hello", "linux", "x86_64")
          assert blob.code
          print(len(blob.code))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: picblobs-dist
          path: dist/picblobs/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi-picblobs
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: picblobs-dist
          path: dist/picblobs

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/picblobs
