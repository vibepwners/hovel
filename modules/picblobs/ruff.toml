target-version = "py310"
line-length = 88
extend-exclude = [
    "build-artifacts",
]

[lint]
select = ["ALL"]
ignore = [
    "ARG001",
    "ARG002",
    "ARG005",
    "ANN",
    "BLE001",
    "C901",
    "COM812",
    "D",
    "EM",
    "ERA001",
    "EXE001",
    "FBT",
    "FLY002",
    "INP001",
    "N806",
    "N818",
    "PLC0415",
    "PLR0911",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLR2004",
                                    "S603",
    "S607",
    "S105",
            "SLF001",
    "T201",
    "TRY003",
    "TRY400",
]

[lint.per-file-ignores]
"python/tests/conftest.py" = ["E402"]
"python/tests/*.py" = ["PLR0402", "PT006", "PT011", "PT012", "PT018", "S101", "S108", "TC003"]
"python/tests/test_sync.py" = ["E402"]
"python_cli/tests/*.py" = ["PLR0402", "PT006", "PT011", "PT012", "PT018", "S101", "S108", "TC003"]
"tools/extract_release.py" = ["E402"]
"tools/generate.py" = ["E501"]
"tools/registry.py" = ["E501"]
"tools/validate_wine.py" = ["E402"]
# kernel/ is standalone operational/educational tooling (eBPF labs, kmod
# loaders, VM harness) run as root with external tools. It is linted for
# correctness (all F-codes, real bugs) but exempt from style / ergonomics /
# security-context rules that do not fit standalone operator scripts.
"kernel/**/*.py" = [
    "E402",    # imports after sys.path setup
    "E501",    # long operator-facing banners/print lines
    "PERF401", # manual list build vs comprehension
    "PLW1510", # subprocess.run without explicit check= (results handled inline)
    "PTH108",  # os.unlink vs Path.unlink
    "PTH110",  # os.path.exists vs Path.exists
    "PTH123",  # open() vs Path.open()
    "PTH208",  # os.listdir vs Path.iterdir
    "S101",    # assert in scripts
    "S104",    # bind 0.0.0.0 (listener is intentionally all-interfaces)
    "S108",    # /tmp usage
    "S310",    # urllib urlopen of operator-supplied URLs
    "SIM115",  # explicit open() vs context manager
]
