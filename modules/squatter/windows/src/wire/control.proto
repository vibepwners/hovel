// Control-plane messages carried in OPEN/CLOSE/CONTROL frame payloads (see
// ../frame.h). DATA frames do not use protobuf -- they carry a module's raw
// bytes.
syntax = "proto3";

package sqmux;

// Sent in an OPEN frame: asks the peer to start `module` for this stream,
// handing it `args` as argv (argv[0] is the module name, supplied by the peer).
message OpenStream {
  string module = 1;
  repeated string args = 2;
}

// Sent in a CLOSE frame: ends the stream. `code` is 0 for a normal close.
message CloseStream {
  uint32 code = 1;
}

// Sent in a CONTROL frame: reports stream state without polluting DATA.
message StreamEvent {
  uint32 kind = 1;
  uint32 code = 2;
  string message = 3;
}
