name: Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "assets/**"
      - "spec/**/*.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/
          cp -r spec _site/
          # Pages serves _site/ as the document root. nothing here needs Jekyll.
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
