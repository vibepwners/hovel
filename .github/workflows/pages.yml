name: Pages

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-pages-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}-${{ github.event.workflow_run.head_sha || github.sha }}
          restore-keys: |
            bazel-demos-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}-${{ github.event.workflow_run.head_sha || github.sha }}
            bazel-pages-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}-
            bazel-demos-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}-
            bazel-pages-${{ runner.os }}-
            bazel-demos-${{ runner.os }}-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.84.0

      - name: Install VHS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg ttyd tmux fonts-dejavu-core

      - name: Install VHS
        run: |
          VHS_VERSION="$(cat tools/demo/vhs_version.txt)"
          go install "github.com/charmbracelet/vhs@${VHS_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          "$(go env GOPATH)/bin/vhs" --version
          ffmpeg -version | head -n 1
          ttyd --version
          tmux -V
          docker version --format 'Docker server {{.Server.Version}}'

      - name: Stage site
        run: task docs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- pages-build

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Pages Deploy"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Status | ${{ job.status }} |"
            echo "| Environment | github-pages |"
            echo "| URL | ${{ steps.deployment.outputs.page_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"
