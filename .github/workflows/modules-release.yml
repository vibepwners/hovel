name: Publish module packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach assets to. Leave empty to build only.
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build module packages
    runs-on: ubuntu-latest
    if: github.event_name != 'release' || startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.52.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check committed version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          core_version="$(tr -d '[:space:]' < core/VERSION)"
          sdk_version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("sdk/python/pyproject.toml").read_text())["project"]["version"])')"
          if [[ "${version}" != "${core_version}" ]]; then
            echo "::error::root VERSION ${version} does not match core/VERSION ${core_version}"
            exit 1
          fi
          if [[ "${version}" != "${sdk_version}" ]]; then
            echo "::error::root VERSION ${version} does not match sdk/python/pyproject.toml ${sdk_version}"
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "release" && "${GITHUB_REF_NAME#v}" != "${version}" ]]; then
            echo "::error::release tag ${GITHUB_REF_NAME} does not match committed VERSION ${version}"
            exit 1
          fi
      - run: task release:modules-package
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: module-packages
          path: dist/modules/
          if-no-files-found: error
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- publish-modules-build

  publish:
    name: Attach module packages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.tag != ''
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: module-packages
          path: dist/modules
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.event_name == 'release' && github.ref_name || inputs.tag }}
          files: dist/modules/*
          fail_on_unmatched_files: true
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Attach Module Packages"
            echo ""
            echo "Attaches the module package artifact set to a GitHub Release."
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Status | ${{ job.status }} |"
            echo "| Release tag | ${{ github.event_name == 'release' && github.ref_name || inputs.tag }} |"
            echo "| Source artifact | module-packages |"
            echo "| Asset path | dist/modules/* |"
            echo ""
            echo "### What This Proves"
            echo ""
            echo "- The module packages generated by the build job were downloaded successfully."
            echo "- GitHub Release asset upload was attempted for every file in dist/modules/."
            echo "- Published assets include module archives, indexes, install set, and checksums."
          } >> "$GITHUB_STEP_SUMMARY"
