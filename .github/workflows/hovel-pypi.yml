name: Publish hovel to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Hovel wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Check committed version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${{ github.event_name }}" == "release" && "${GITHUB_REF_NAME#v}" != "${version}" ]]; then
            echo "::error::release tag ${GITHUB_REF_NAME} does not match committed VERSION ${version}"
            exit 1
          fi
          echo "Publishing hovel ${version} from committed VERSION"

      - name: Build wheel
        run: task release:hovel-wheels

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: hovel-wheels
          path: dist/*.whl
          if-no-files-found: error

      - name: Job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- publish-hovel-build

  modules:
    name: Build module release packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Check committed version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${{ github.event_name }}" == "release" && "${GITHUB_REF_NAME#v}" != "${version}" ]]; then
            echo "::error::release tag ${GITHUB_REF_NAME} does not match committed VERSION ${version}"
            exit 1
          fi
          echo "Packaging release module artifacts from committed VERSION ${version}"

      - name: Build module packages
        run: task modules:package

      - name: Upload module package artifact
        uses: actions/upload-artifact@v4
        with:
          name: hovel-module-packages
          path: dist/modules/*
          if-no-files-found: error

      - name: Upload module packages to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" dist/modules/* --clobber

      - name: Job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- publish-hovel-modules

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: hovel-wheels
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Publish Hovel to PyPI"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Status | ${{ job.status }} |"
            echo "| Environment | pypi |"
            echo "| Artifact | hovel-wheels |"
            echo "| Publisher | pypa/gh-action-pypi-publish@release/v1 |"
          } >> "$GITHUB_STEP_SUMMARY"
