name: Publish hovel to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, without the leading v
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: macos-arm64
            os: macos-14
          - name: windows-x86_64
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Resolve version
        shell: bash
        run: |
          version="${{ inputs.version || github.ref_name }}"
          echo "HOVEL_VERSION=${version#v}" >> "$GITHUB_ENV"

      - name: Build wheel
        run: task release:hovel-wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: hovel-wheel-${{ matrix.name }}
          path: dist/*.whl
          if-no-files-found: error

  modules:
    name: Build module release packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Resolve version
        shell: bash
        run: |
          version="${{ inputs.version || github.ref_name }}"
          echo "HOVEL_MODULE_VERSION=${version#v}" >> "$GITHUB_ENV"

      - name: Build module packages
        run: task modules:package

      - name: Upload module package artifact
        uses: actions/upload-artifact@v4
        with:
          name: hovel-module-packages
          path: dist/modules/*
          if-no-files-found: error

      - name: Upload module packages to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" dist/modules/* --clobber

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: hovel-wheel-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
