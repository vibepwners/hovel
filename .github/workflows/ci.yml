name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core fmt, lint, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-repository-${{ runner.os }}-${{ hashFiles('core/MODULE.bazel.lock', 'core/.bazelversion') }}
          restore-keys: bazel-repository-${{ runner.os }}-
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        shell: bash
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          set +x
          ci_bazelrc="${RUNNER_TEMP}/bazel-ci.bazelrc"
          echo "build:github-actions --repository_cache=${HOME}/.cache/bazel-repository" > "${ci_bazelrc}"
          bazel_configs="--config=github-actions"
          if [[ -n "${BUILDBUDDY_API_KEY}" ]]; then
            echo "::add-mask::${BUILDBUDDY_API_KEY}"
            {
              echo "common --noannounce_rc"
              echo "build:ci --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}"
            } >> "${ci_bazelrc}"
            bazel_configs="${bazel_configs} --config=ci"
          fi
          chmod 600 "${ci_bazelrc}"
          echo "HOVEL_BAZEL_STARTUP_ARGS=--bazelrc=${ci_bazelrc}" >> "$GITHUB_ENV"
          echo "HOVEL_BAZEL_ARGS=${bazel_configs}" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache: false
      - run: task checkout:status
      - run: task lint
      - run: task build -- //:build
      - run: task test -- //:ci_test
      - run: task test -- //:race_test //:fuzz_smoke_test
      - run: task coverage
      - run: task release:hovel-wheels
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: core-bazel-testlogs
          path: core/bazel-testlogs/
          if-no-files-found: ignore
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- ci-build-test

  sdk:
