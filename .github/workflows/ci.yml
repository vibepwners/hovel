name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build

      - name: Test
        run: task test

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs
          path: bazel-testlogs/
          if-no-files-found: ignore

  squatter-wine:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-wine-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-wine-${{ runner.os }}-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wine
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine
          wine --version

      - name: Squatter Wine tests
        run: task squatter:test:wine

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-squatter-wine
          path: bazel-testlogs/
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-lint-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-lint-${{ runner.os }}-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Lint
        run: task lint
