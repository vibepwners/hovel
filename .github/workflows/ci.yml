name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build
        run: task build

      - name: Test
        run: task test

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs
          path: bazel-testlogs/
          if-no-files-found: ignore

  demos:
    runs-on: ubuntu-24.04
    needs: build-test
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-demos-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-demos-${{ runner.os }}-
            bazel-${{ runner.os }}-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install VHS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg ttyd tmux fonts-dejavu-core

      - name: Install VHS
        run: |
          go install github.com/charmbracelet/vhs@v0.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          "$(go env GOPATH)/bin/vhs" --version
          ffmpeg -version | head -n 1
          ttyd --version
          tmux -V
          docker version --format 'Docker server {{.Server.Version}}'

      - name: Generate demos
        run: |
          task demos
          task demo:squatter-wine

      - name: Upload demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hovel-demos
          path: demo/out/*.gif
          if-no-files-found: error

  docs:
    runs-on: ubuntu-latest
    needs: demos
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-docs-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-docs-${{ runner.os }}-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.84.0

      - name: Download demo artifacts
        uses: actions/download-artifact@v4
        with:
          name: hovel-demos
          path: demo/out

      - name: Build docs
        run: task docs:stage

  squatter-wine:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-wine-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-wine-${{ runner.os }}-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wine
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine
          wine --version

      - name: Squatter Wine tests
        run: task squatter:test:wine

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-testlogs-squatter-wine
          path: bazel-testlogs/
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-lint-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', '.bazelversion') }}
          restore-keys: |
            bazel-lint-${{ runner.os }}-

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install C analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cppcheck clang-tidy

      - name: Install lizard
        run: uv tool install lizard

      - name: Verify lint tools
        run: |
          go version
          uv --version
          lizard --version
          cppcheck --version
          clang-tidy --version

      - name: Lint
        run: task lint
