      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- docs-ci

  squatter-wine:
    name: Squatter Wine tests and demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        shell: bash
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          set +x
          ci_bazelrc="${RUNNER_TEMP}/bazel-ci.bazelrc"
          echo "build:github-actions --repository_cache=${HOME}/.cache/bazel-repository" > "${ci_bazelrc}"
          bazel_configs="--config=github-actions"
          if [[ -n "${BUILDBUDDY_API_KEY}" ]]; then
            echo "::add-mask::${BUILDBUDDY_API_KEY}"
            {
              echo "common --noannounce_rc"
              echo "build:ci --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}"
            } >> "${ci_bazelrc}"
            bazel_configs="${bazel_configs} --config=ci"
          fi
          chmod 600 "${ci_bazelrc}"
          echo "HOVEL_BAZEL_STARTUP_ARGS=--bazelrc=${ci_bazelrc}" >> "$GITHUB_ENV"
          echo "HOVEL_BAZEL_ARGS=${bazel_configs}" >> "$GITHUB_ENV"
      - name: Install demo host tools
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --install-recommends wine32 wine64
      - run: task modules:wine-test
      - run: task docs:demos:wine
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- squatter-wine
