name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo:
    name: Repository policy and build hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.52.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - run: task checkout:status
      - run: task repo:quality
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- repo-quality

  core:
    name: Core fmt, lint, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-repository-${{ runner.os }}-${{ hashFiles('core/MODULE.bazel.lock', 'core/.bazelversion') }}
          restore-keys: bazel-repository-${{ runner.os }}-
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.52.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - run: task checkout:status
      - run: task core:ci
      - run: task release:hovel-wheels
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-bazel-testlogs
          path: core/bazel-testlogs/
          if-no-files-found: ignore
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- ci-build-test

  sdk:
    name: SDK build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.52.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - run: task sdk:ci
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- sdk-ci

  modules:
    name: Modules build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.52.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - run: task modules:ci
      - run: task release:modules-package
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: module-packages
          path: dist/modules/
          if-no-files-found: error
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- modules-ci

  docs:
    name: Docs verification and host demos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.52.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - name: Verify remote-compatible docs
        run: task docs:check
      - name: Render host-service demos and stage site
        run: task docs:site
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-site
          path: _site/
          if-no-files-found: error
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- docs-ci

  squatter-wine:
    name: Squatter Wine tests and demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.52.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - name: Install demo host tools
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --install-recommends wine32 wine64
      - run: task modules:wine-test
      - run: task docs:demos:wine
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- squatter-wine
