name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core fmt, lint, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-repository-${{ runner.os }}-${{ hashFiles('core/MODULE.bazel.lock', 'core/.bazelversion') }}
          restore-keys: bazel-repository-${{ runner.os }}-
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - run: task checkout:status
      - run: task lint
      - run: task build -- //:build
      - run: task test -- //:ci_test //:race_test //:fuzz_smoke_test
      - run: task coverage
      - run: task release:hovel-wheels
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: core-bazel-testlogs
          path: core/bazel-testlogs/
          if-no-files-found: ignore
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- ci-build-test

  sdk:
    name: SDK build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - run: task sdk:ci
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- sdk-ci

  modules:
    name: Modules build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - run: task modules:ci
      - run: task release:modules-package
      - uses: actions/upload-artifact@v4
        with:
          name: module-packages
          path: dist/modules/
          if-no-files-found: error
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- modules-ci

  docs:
    name: Docs build and demos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - run: task docs:ci
      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: _site/
          if-no-files-found: error
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- docs-ci

  squatter-wine:
    name: Squatter Wine tests and demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel-repository
          key: bazel-slices-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock', 'MODULE.bazel', '.bazelversion') }}
          restore-keys: bazel-slices-${{ runner.os }}-
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Bazel cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: task actions:configure-bazel-cache
      - name: Install demo host tools
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --install-recommends wine32 wine64
      - run: task modules:wine-test
      - run: task docs:demos:wine
      - if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- squatter-wine
