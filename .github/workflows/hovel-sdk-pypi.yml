name: Publish hovel-sdk to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'release' || startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.52.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Check committed version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          core_version="$(tr -d '[:space:]' < core/VERSION)"
          sdk_version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("sdk/python/pyproject.toml").read_text())["project"]["version"])')"
          if [[ "${version}" != "${core_version}" ]]; then
            echo "::error::root VERSION ${version} does not match core/VERSION ${core_version}"
            exit 1
          fi
          if [[ "${version}" != "${sdk_version}" ]]; then
            echo "::error::root VERSION ${version} does not match sdk/python/pyproject.toml ${sdk_version}"
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "release" && "${GITHUB_REF_NAME#v}" != "${version}" ]]; then
            echo "::error::release tag ${GITHUB_REF_NAME} does not match committed VERSION ${version}"
            exit 1
          fi
          echo "Publishing hovel-sdk ${version} from committed VERSION"

      - name: Build dist
        run: task release:hovel-sdk-dist

      - name: Upload dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hovel-sdk-dist
          path: dist/*
          if-no-files-found: error

      - name: Job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: task actions:summary -- publish-sdk-build

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hovel-sdk-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Publish Hovel SDK to PyPI"
            echo ""
            echo "Publishes the hovel-sdk Python distribution built by the previous job to the configured PyPI environment."
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Status | ${{ job.status }} |"
            echo "| Environment | pypi |"
            echo "| Artifact | hovel-sdk-dist |"
            echo "| Publisher | pypa/gh-action-pypi-publish@v1.14.0 |"
            echo ""
            echo "### What This Proves"
            echo ""
            echo "- The hovel-sdk-dist artifact was downloaded successfully."
            echo "- Trusted publishing to PyPI was attempted with GitHub OIDC."
            echo "- The package being published is the Python SDK used by module authors."
          } >> "$GITHUB_STEP_SUMMARY"
