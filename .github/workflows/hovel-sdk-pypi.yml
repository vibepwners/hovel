name: Publish hovel-sdk to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check committed version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${{ github.event_name }}" == "release" && "${GITHUB_REF_NAME#v}" != "${version}" ]]; then
            echo "::error::release tag ${GITHUB_REF_NAME} does not match committed VERSION ${version}"
            exit 1
          fi
          echo "Publishing hovel-sdk ${version} from committed VERSION"

      - name: Build dist
        run: task release:hovel-sdk-dist

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: hovel-sdk-dist
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: hovel-sdk-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
