name: Publish hovel-sdk to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, without the leading v
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Resolve version
        shell: bash
        run: |
          version="${{ inputs.version || github.ref_name }}"
          version="${version#v}"
          python - <<PY
          from pathlib import Path
          path = Path("sdk/python/pyproject.toml")
          text = path.read_text()
          path.write_text(text.replace('version = "0.0.0"', 'version = "${version}"'))
          PY

      - name: Build dist
        run: task release:hovel-sdk-dist

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: hovel-sdk-dist
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: hovel-sdk-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
